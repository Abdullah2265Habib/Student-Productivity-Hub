<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals Calendar – Student Productivity Hub</title>
    <meta name="description" content="View all your goals in a beautiful calendar with timelines and summaries.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/calendar.css">
</head>
<body>
    <script>
        fetch("../../backend/check_auth.php")
            .then(res=>res.text())
            .then(res=>{
                if(res=="unauthorized"){
                    window.location = "login.html";
                }
            });
    </script>

<!-- ── Navbar ─────────────────────────────────── -->
<nav class="navbar">
    <div class="container">
        <a href="dashboard.html" class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>StudyHub</span>
        </a>
        <div class="nav-right">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Dashboard
            </a>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
</nav>

<!-- ── Page Header ────────────────────────────── -->
<header class="page-header">
    <h1><i class="fas fa-calendar-days"></i> Goals Calendar</h1>
    <p>Track your goal deadlines and stay on top of your objectives</p>
</header>

<!-- ── Main Content ───────────────────────────── -->
<main class="main-container">
    <div class="calendar-wrapper">
        <!-- Calendar Navigation -->
        <div class="calendar-nav">
            <button id="prevMonth" class="nav-btn" title="Previous month">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="month-year" id="monthYear">January 2026</div>
            <button id="nextMonth" class="nav-btn" title="Next month">
                <i class="fas fa-chevron-right"></i>
            </button>
            <button id="todayBtn" class="today-btn">
                <i class="fas fa-calendar-check"></i> Today
            </button>
        </div>

        <!-- Calendar Grid -->
        <div class="calendar-container">
            <div class="weekdays">
                <div class="weekday">Sun</div>
                <div class="weekday">Mon</div>
                <div class="weekday">Tue</div>
                <div class="weekday">Wed</div>
                <div class="weekday">Thu</div>
                <div class="weekday">Fri</div>
                <div class="weekday">Sat</div>
            </div>

            <div class="calendar-grid" id="calendarGrid">
                <!-- Generated by JavaScript -->
            </div>
        </div>

        <!-- Legend -->
        <div class="calendar-legend">
            <div class="legend-item">
                <span class="legend-marker goal-deadline"></span>
                <span>Goal Deadline</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker today-date"></span>
                <span>Today</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker has-multiple"></span>
                <span>Multiple Goals</span>
            </div>
        </div>
    </div>

    <!-- Goals Summary Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebarTitle">Select a date</h3>
            <button class="close-sidebar" id="closeSidebar" title="Close">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="sidebar-content" id="sidebarContent">
            <div class="empty-state">
                <i class="fas fa-calendar"></i>
                <p>Click on a date to view goals</p>
            </div>
        </div>
    </div>
</main>

<!-- ═══════════════════════════════════════════
     GOAL DETAIL MODAL
     ═══════════════════════════════════════════ -->
<div class="modal-overlay" id="goalModalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="goalModalTitle">Goal Details</h2>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>

        <div class="modal-body" id="goalModalBody">
            <!-- Content populated by JavaScript -->
        </div>

        <div class="modal-footer">
            <button class="btn-secondary" id="editGoalBtn">
                <i class="fas fa-edit"></i> Edit Goal
            </button>
            <button class="btn-primary" id="viewGoalsPageBtn">
                <i class="fas fa-link"></i> Go to Goals Page
            </button>
        </div>
    </div>
</div>

<script src="../assets/js/calendar.js"></script>

</body>
</html>
