<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Goals – Student Productivity Hub</title>
    <meta name="description" content="Set, track and achieve your academic goals.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/goals.css">
</head>
<body>
    <script>
        fetch("/Student-Productivity-Hub/backend/check_auth.php")
            .then(res=>res.text())
            .then(res=>{
                if(res=="unauthorized"){
                    window.location = "login.html";
                }
            });
    </script>

<!-- ── Navbar ─────────────────────────────────── -->
<nav class="navbar">
    <div class="container">
        <a href="dashboard.html" class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>StudyHub</span>
        </a>
        <div class="nav-right">
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Dashboard
            </a>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
</nav>

<!-- ── Page Header ────────────────────────────── -->
<header class="page-header">
    <h1><i class="fas fa-bullseye"></i> My Goals</h1>
    <p>Set and track your academic goals with priorities and deadlines</p>
</header>

<!-- ── Main Content ───────────────────────────── -->
<main class="main-container">

    <!-- ── Action Bar (always visible) ─────────── -->
    <div class="action-bar">
        <button class="load-goals-btn" id="loadGoalsBtn">
            <i class="fas fa-folder-open"></i> View My Goals
        </button>
        <button class="add-goal-btn" id="addGoalBtn">
            <i class="fas fa-plus"></i> Add Goal
        </button>
    </div>

    <!-- ── Goals Section (hidden until user clicks View My Goals) ── -->
    <section id="goalsSection" style="display:none;">

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search goals…" autocomplete="off">
            </div>
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Goals</button>
            <button class="filter-tab" data-filter="pending">
                <i class="fas fa-clock"></i> Pending
            </button>
            <button class="filter-tab" data-filter="in_progress">
                <i class="fas fa-spinner"></i> In Progress
            </button>
            <button class="filter-tab" data-filter="completed">
                <i class="fas fa-check-circle"></i> Completed
            </button>
        </div>

        <!-- Priority filter -->
        <div class="priority-filter">
            <label>Priority:</label>
            <select id="priorityFilter">
                <option value="">All Priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>

        <!-- Goals Grid -->
        <div class="goals-grid" id="goalsGrid">
            <!-- Populated by goals.js -->
        </div>

    </section>

</main>

<!-- ═══════════════════════════════════════════
     ADD/EDIT GOAL MODAL
     ═══════════════════════════════════════════ -->
<div class="modal-overlay" id="goalModalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Add New Goal</h2>
            <button class="modal-close" id="closeGoalModal">&times;</button>
        </div>

        <form id="goalForm" class="goal-form">
            <input type="hidden" id="goalId" value="">

            <div class="form-group">
                <label for="goalText">Goal</label>
                <textarea id="goalText" placeholder="What do you want to achieve?" required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="targetDate">Target Date</label>
                    <input type="date" id="targetDate" required>
                </div>

                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" required>
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <div class="form-group" id="statusGroup" style="display:none;">
                <label for="status">Status</label>
                <select id="status">
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" id="goalFormCancel">Cancel</button>
                <button type="submit" class="btn-submit">Save Goal</button>
            </div>
        </form>
    </div>
</div>

<!-- ═══════════════════════════════════════════
     GOAL DETAIL MODAL (for viewing/editing)
     ═══════════════════════════════════════════ -->
<div class="modal-overlay" id="goalDetailOverlay">
    <div class="modal goal-detail-modal">
        <div class="modal-header">
            <h2 id="detailTitle">Goal Details</h2>
            <button class="modal-close" id="closeDetailModal">&times;</button>
        </div>

        <div class="goal-detail-content" id="goalDetailContent">
            <!-- Populated by goals.js -->
        </div>

        <div class="detail-actions">
            <button class="btn-secondary" id="editGoalBtn">
                <i class="fas fa-edit"></i> Edit
            </button>
            <button class="btn-secondary" id="changeStatusBtn">
                <i class="fas fa-exchange-alt"></i> Change Status
            </button>
            <button class="btn-danger" id="deleteGoalBtn">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
    </div>
</div>


<script src="../assets/js/goals.js"></script>

</body>
</html>
